<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280" role="img" aria-label="macOS-style terminal window showing okman list output">
  <title>okman list</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="14" y="14" width="492" height="252" rx="16"/>
    </clipPath>
    <style>
      .window { fill: #1e1e2e; stroke: #45475a; stroke-width: 1; }
      .titlebar { fill: #313244; }
      .title { fill: #cdd6f4; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; letter-spacing: 0.2px; opacity: 0.92; }
      .term { font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, Monaco, monospace; font-size: 14px; }
      .prompt { fill: #a6e3a1; font-weight: 600; }
      .command { fill: #cdd6f4; }
      .tbl { stroke: #585b70; stroke-width: 1; fill: none; }
      .cell { fill: #bac2de; font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, Monaco, monospace; font-size: 14px; }
      .hdr { fill: #cdd6f4; font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, Monaco, monospace; font-size: 14px; font-weight: 600; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect class="window" x="14" y="14" width="492" height="252" rx="16"/>
    <g clip-path="url(#windowClip)">
      <rect class="titlebar" x="14" y="14" width="492" height="54" rx="16"/>
      <rect class="titlebar" x="14" y="36" width="492" height="16"/>
      <rect x="14" y="52" width="492" height="214" fill="#1e1e2e"/>
      <line x1="14" y1="52" x2="506" y2="52" stroke="#45475a" stroke-width="1" opacity="0.75"/>

      <circle cx="30" cy="33" r="6" fill="#ff5f57"/>
      <circle cx="48" cy="33" r="6" fill="#febc2e"/>
      <circle cx="66" cy="33" r="6" fill="#28c840"/>

      <text x="260" y="37" text-anchor="middle" class="title">okman</text>

      <!-- Prompt line -->
      <text x="38" y="82" class="term">
        <tspan class="prompt">$</tspan><tspan class="command"> okman list</tspan>
      </text>

      <!-- Table: 4 rows × 28px each = 112px total, starting at y=94 -->
      <rect x="38" y="94" width="240" height="112" rx="0" class="tbl"/>
      <line x1="138" y1="94" x2="138" y2="206" class="tbl"/>
      <line x1="38" y1="122" x2="278" y2="122" class="tbl"/>
      <line x1="38" y1="150" x2="278" y2="150" class="tbl"/>
      <line x1="38" y1="178" x2="278" y2="178" class="tbl"/>

      <text x="52" y="113" class="hdr">Slot</text>
      <text x="152" y="113" class="hdr">Label</text>

      <text x="52" y="141" class="cell">1a</text>
      <text x="152" y="141" class="cell">GitHub</text>

      <text x="52" y="169" class="cell">2a</text>
      <text x="152" y="169" class="cell">AWS</text>

      <text x="52" y="197" class="cell">3b</text>
      <text x="152" y="197" class="cell">VPN</text>
    </g>
  </g>
</svg>
